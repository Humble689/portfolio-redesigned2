<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('portfolio-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolvedTheme = savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : (prefersDark ? 'dark' : 'light');

          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(resolvedTheme);
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <title>Lufene Mark Travis, Software Developer & CS Graduate</title>
    <meta name="description" content="Portfolio of Lufene Mark Travis, a Computer Science graduate from Uganda Christian University specializing in full-stack development, cybersecurity, and AI systems." />
    <meta name="keywords" content="Lufene Mark Travis, software developer, Uganda, React, Node.js, Python, cybersecurity, AI, portfolio" />
    <meta property="og:title" content="Lufene Mark Travis, Software Developer" />
    <meta property="og:description" content="Building secure, intelligent systems across Africa and beyond." />
    <meta property="og:type" content="website" />

</html>
